<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LOF 溢价监控 · 一键触发</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px; color: #e6edf3;
    }
    .card {
      background: #21262d; border-radius: 16px; padding: 36px 28px;
      max-width: 380px; width: 100%;
      border: 1px solid #30363d; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 { font-size: 20px; font-weight: 700; color: #f0f6fc; margin-bottom: 4px; }
    .sub { color: #8b949e; font-size: 13px; margin-bottom: 24px; }
    .step { color: #8b949e; font-size: 13px; margin-bottom: 8px; }
    .token-input {
      width: 100%; padding: 10px 12px; border-radius: 8px;
      border: 1px solid #30363d; background: #0d1117; color: #e6edf3;
      font-size: 14px; font-family: monospace; margin-bottom: 12px;
      outline: none; transition: border 0.2s;
    }
    .token-input:focus { border-color: #58a6ff; }
    .token-input::placeholder { color: #484f58; }
    .save-row { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; }
    .save-row input[type="checkbox"] { accent-color: #58a6ff; }
    .save-row label { font-size: 12px; color: #8b949e; cursor: pointer; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; margin-bottom: 10px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #238636, #2ea043);
      color: white;
    }
    .btn-primary:hover { background: linear-gradient(135deg, #2ea043, #3fb950); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #30363d; color: #8b949e; font-size: 13px; }
    .btn-secondary:hover { background: #3d444d; }
    .status {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      font-size: 13px; line-height: 1.6; display: none;
    }
    .status.show { display: block; }
    .status.success { background: #0d2818; color: #3fb950; border: 1px solid #1a7f37; }
    .status.error   { background: #2d1014; color: #f85149; border: 1px solid #da3633; }
    .status.loading { background: #0c1a2e; color: #58a6ff; border: 1px solid #1f6feb; }
    .hint { font-size: 11px; color: #484f58; margin-top: 16px; line-height: 1.6; }
    .hint a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>📊 LOF 溢价监控</h1>
    <p class="sub">一键触发查询，结果推送到微信</p>

    <p class="step">步骤 1：粘贴 GitHub Token（首次需要，之后自动保存）</p>
    <input class="token-input" id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx" />
    <div class="save-row">
      <input type="checkbox" id="saveToken" checked />
      <label for="saveToken">保存到浏览器本地（下次无需再填）</label>
    </div>

    <button class="btn btn-primary" id="triggerBtn" onclick="trigger()">
      🚀 立即触发查询
    </button>

    <button class="btn btn-secondary" onclick="checkStatus()">
      🔍 查看上次运行状态
    </button>

    <div class="status" id="status"></div>

    <p class="hint">
      💡 Token 获取：<a href="https://github.com/settings/tokens/new?scopes=repo&description=lof-trigger" target="_blank">点此生成</a>（只需勾选 repo 权限）<br>
      🔒 Token 仅保存在你的浏览器，不会上传到任何服务器
    </p>
  </div>

  <script>
    const OWNER = "Cyril1688";
    const REPO  = "lof-monitor";

    // 页面加载时恢复保存的 token
    window.onload = () => {
      const saved = localStorage.getItem("lof_gh_token");
      if (saved) {
        document.getElementById("tokenInput").value = saved;
      }
    };

    function getToken() {
      const token = document.getElementById("tokenInput").value.trim();
      if (!token) { alert("请先粘贴 GitHub Token"); return null; }
      // 保存（如果用户勾选了）
      if (document.getElementById("saveToken").checked) {
        localStorage.setItem("lof_gh_token", token);
      }
      return token;
    }

    function setStatus(type, html) {
      const el = document.getElementById("status");
      el.className = `status show ${type}`;
      el.innerHTML = html;
    }

    async function trigger() {
      const token = getToken();
      if (!token) return;

      const btn = document.getElementById("triggerBtn");
      btn.disabled = true;
      btn.textContent = "⏳ 触发中...";
      setStatus("loading", "⏳ 正在触发 GitHub Actions，请稍候...");

      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/dispatches`,
          {
            method: "POST",
            headers: {
              "Authorization": `token ${token}`,
              "Accept": "application/vnd.github+json",
              "Content-Type": "application/json",
              "X-GitHub-Api-Version": "2022-11-28",
            },
            body: JSON.stringify({ event_type: "manual_trigger" })
          }
        );

        if (res.status === 204) {
          setStatus("success",
            "✅ <b>触发成功！</b><br><br>" +
            "GitHub Actions 已开始运行<br>" +
            "约 <b>1-2 分钟</b>后微信会收到推送<br><br>" +
            "<small>可以点击下方按钮查看运行状态</small>"
          );
        } else {
          const text = await res.text();
          throw new Error(`HTTP ${res.status}: ${text}`);
        }
      } catch (e) {
        setStatus("error", `❌ 触发失败<br><br><small>${e.message}</small>`);
      } finally {
        btn.disabled = false;
        btn.textContent = "🚀 立即触发查询";
      }
    }

    async function checkStatus() {
      const token = getToken();
      if (!token) return;

      setStatus("loading", "⏳ 查询运行状态...");

      try {
        const res = await fetch(
          `https://api.github.com/repos/${OWNER}/${REPO}/actions/runs?per_page=1`,
          {
            headers: {
              "Authorization": `token ${token}`,
              "Accept": "application/vnd.github+json",
            }
          }
        );
        const data = await res.json();
        const runs = data.workflow_runs || [];
        if (runs.length === 0) {
          setStatus("success", "暂无运行记录");
          return;
        }
        const r = runs[0];
        const t = new Date(r.created_at).toLocaleString("zh-CN");
        let icon, desc;
        if (r.status === "in_progress") { icon = "⏳"; desc = "运行中"; }
        else if (r.status === "queued") { icon = "📋"; desc = "排队中"; }
        else if (r.conclusion === "success") { icon = "✅"; desc = "成功"; }
        else { icon = "❌"; desc = `失败（${r.conclusion}）`; }

        setStatus("success",
          `${icon} <b>上次运行：${desc}</b><br><br>` +
          `时间：${t}<br>` +
          `<small><a href="${r.html_url}" target="_blank">查看详细日志 ↗</a></small>`
        );
      } catch (e) {
        setStatus("error", `查询失败<br><br><small>${e.message}</small>`);
      }
    }
  </script>
</body>
</html>
